<title>台語情緒標註（純聽影片）</title>
<style>

.prog{height:6px;background:var(--line);border-radius:99px;overflow:hidden;} .prog>i{display:block;height:100%;background:var(--accent);width:0;transition:width .2s;}

.banner{background:#fdf3e7;border:1px solid #f0d7b8;color:var(--warn);font-size:12px;padding:8px 11px;border-radius:8px;line-height:1.5;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:14px;}
.vidbox{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;} #player{width:100%;height:100%;}
.plays{display:flex;gap:8px;flex-wrap:wrap;} .play{font:inherit;font-size:14px;padding:9px 14px;border:1px solid var(--accent);color:var(--accent);border-radius:9px;background:#fff;cursor:pointer;font-weight:600;} .play.ctx{border-color:var(--line);color:var(--muted);font-weight:400;}

<div class="wrap">
  <header>
    <div class="titlerow"><h1>台語情緒標註 · 聽聲音看影片</h1>

    <div class="prog"><i id="bar"></i></div>

    <div class="banner" id="banner" style="display:none"></div>
  </header>
  <div class="card">
    <div class="uttid" id="uttid"></div>
    <div class="vidbox"><div id="player"></div></div>
    <div class="plays">
      <button class="play" id="playOne">▶ 播放這句</button>
      <button class="play ctx" id="playCtx">▶ 連前後一起播</button>
    </div>
    <div>
      <div class="label">前後脈絡（不顯示文字 · 點下去單獨聽）</div>
      <div class="ctx" id="ctx"></div>
    </div>
    <div>
      <div class="label">這句說話者的情緒（看影片＋聽聲音判斷）</div>
      <div class="emos" id="emos"></div>
    </div>
    <div class="row"><span>信心</span><div class="conf" id="conf"></div>
      <label class="ck"><input type="checkbox" id="ckctx"> 需要脈絡才判得出</label></div>
  </div>
  <div class="nav">
    <button id="prev">‹ 上一題</button>
    <button id="export" class="export">匯出 CSV（備份）</button>
    <button id="next">下一題 ›</button>
  </div>
  <div class="hint">鍵盤：1–7 選情緒 · ←/→ 換題 · Q 播這句 · W 連脈絡播 · 進度與標註自動存這台瀏覽器並上傳</div>
</div>

const ENDPOINT = "https://script.google.com/macros/s/AKfycbxCP759pDfg5HidHuU6wRFqY9bIPmX-ZMIXzBEL7aL1IMxfqUy5YeGL8ZPu9XM5lwD8/exec";
const ONLINE = !ENDPOINT.startsWith("__");
const EMOS = [["happy","歡喜"],["angry","受氣"],["sad","悲傷"],["fear","驚惶"],["surprised","著驚"],["neutral","平常"],["uncertain","無確定"]];
const POSLBL = {"-2":"前2","-1":"前1","0":"這句","1":"後1","2":"後2"};
const QKEY = "taigi_queue_v2";          // 全域重送佇列
let i=0, store={}, player=null, ready=false;
const $=s=>document.querySelector(s);
const who=()=> ($("#who").value||"").trim();
const ukey=()=> "taigi_ui_v2_"+(who()||"anon");

function load(){ try{ store=JSON.parse(localStorage.getItem(ukey())||"{}"); }catch(e){ store={}; } }
function persist(){ localStorage.setItem(ukey(),JSON.stringify(store)); }
function rec(){ const id=ITEMS[i].id; return store[id]||(store[id]={}); }
function cur(){ return ITEMS[i]; }

// ---- YouTube ----
window.onYouTubeIframeAPIReady=function(){
  player=new YT.Player('player',{height:'100%',width:'100%',videoId:'',
    playerVars:{rel:0,modestbranding:1,playsinline:1},
    events:{onReady:()=>{ready=true;cueIt();}}});
};
function cueIt(){ const it=cur(); if(ready&&it) player.cueVideoById({videoId:it.video,startSeconds:it.c0,endSeconds:it.c1}); }
function play(a,b){ const it=cur(); if(ready&&it) player.loadVideoById({videoId:it.video,startSeconds:a,endSeconds:b}); }

// ---- 重送佇列（謹慎：本機先存，確認上傳成功才出列；annotation_id 讓重送冪等）----
function queue(){ try{ return JSON.parse(localStorage.getItem(QKEY)||"[]"); }catch(e){ return []; } }
function setQueue(q){ localStorage.setItem(QKEY,JSON.stringify(q)); }
function enqueue(payload){ if(!ONLINE) return; const q=queue().filter(p=>p.annotation_id!==payload.annotation_id); q.push(payload); setQueue(q); flush(); }   // 同 id 只留最新一筆待送
function jsonp(payload){
  return new Promise((res,rej)=>{
    const cb="cb_"+payload.annotation_id.replace(/[^a-z0-9]/gi,"");
    const t=setTimeout(()=>{ cleanup(); rej({server:false,error:"timeout"}); }, 12000);
    function cleanup(){ clearTimeout(t); delete window[cb]; s.remove(); }
    window[cb]=r=>{ cleanup(); (r&&r.ok)?res(r):rej({server:true,error:(r&&r.error)||"server-reject"}); };
    const s=document.createElement("script");
    s.onerror=()=>{ cleanup(); rej({server:false,error:"neterr"}); };
    s.src=ENDPOINT+"?callback="+cb+"&data="+encodeURIComponent(JSON.stringify(payload));
    document.body.appendChild(s);
  });
}
let flushing=false;
async function flush(){
  if(!ONLINE||flushing) return;
  flushing=true;
  let q=queue();
  while(q.length){
    const sent=q[0];              // 這輪要送的那筆；await 期間 enqueue 可能用「同 id 留最新」換掉佇列頭
    const done=p=>!(p.annotation_id===sent.annotation_id&&p.timestamp===sent.timestamp);  // 只移除剛送的這筆，同 id 新版留著續送（別再盲目 shift 掉沒送的）
    try{ await jsonp(sent); q=queue().filter(done); setQueue(q); }     // 成功 → 出列
    catch(e){
      if(e&&e.server){            // 伺服器明確拒收這筆 → 移到 dead-letter，別卡死後面整列
        const dl=JSON.parse(localStorage.getItem("taigi_deadletter")||"[]");
        dl.push({payload:sent,error:e.error}); localStorage.setItem("taigi_deadletter",JSON.stringify(dl));
        q=queue().filter(done); setQueue(q);
      } else { break; }           // 傳輸失敗（斷網/逾時）→ 留著下次再送
    }
  }
  // ponytail: 唯一鍵用 annotation_id+timestamp(ms)；人手連點 ms 不會撞，若日後改機器連發需加遞增序號
  flushing=false; renderSync();
}
function renderSync(){
  const el=$("#sync"); const n=queue().length;
  const dl=(JSON.parse(localStorage.getItem("taigi_deadletter")||"[]")).length;
  if(!ONLINE){ el.innerHTML='<span class="pend">僅存本機</span>'; return; }
  let s = n ? '<span class="pend">待上傳 '+n+' 筆 ⟳</span>' : '<span class="ok">已同步 ✓</span>';
  if(dl) s += ' <span class="pend">⚠ '+dl+' 筆被拒，請用「匯出 CSV」回傳</span>';  // 別讓「已同步」說謊
  el.innerHTML = s;
}

function render(){
  const it=cur(), r=store[it.id]||{};
  $("#uttid").textContent=it.id;
  $("#ctx").innerHTML=it.lines.map(L=>{
    const lbl=POSLBL[String(L.pos)]||("@"+L.a+"s");
    return '<button class="cbtn'+(L.tgt?' tgt':'')+'" data-a="'+L.a+'" data-b="'+L.b+'">'
      +(L.tgt?'':'▶ ')+lbl+'</button>';
  }).join("");
  $("#emos").innerHTML=EMOS.map((e,n)=>'<button class="emo'+(r.emotion===e[0]?' sel':'')+'" data-e="'+e[0]+'">'+e[1]+'<kbd>'+(n+1)+'</kbd></button>').join("");
  $("#conf").innerHTML=[1,2,3,4,5].map(c=>'<button class="'+(r.conf===c?'sel':'')+'" data-c="'+c+'">'+c+'</button>').join("");
  $("#ckctx").checked=!!r.ctx_needed;
  const done=ITEMS.filter(x=>store[x.id]&&store[x.id].emotion).length;
  $("#done").textContent=done; $("#total").textContent=ITEMS.length;
  $("#pos").textContent="第 "+(i+1)+"/"+ITEMS.length+" 題";
  $("#bar").style.width=(done/ITEMS.length*100)+"%";
  $("#prev").disabled=i===0; $("#next").disabled=i===ITEMS.length-1;
  renderSync();
}
function go(d){ i=Math.max(0,Math.min(ITEMS.length-1,i+d)); render(); cueIt(); }

// banner 優先序：未填代號 > 未連後端 > 隱藏
function updateBanner(){
  const b=$("#banner");
  if(!who()){ b.style.display="block"; b.textContent="⚠ 請先填左上「標注者代號」再開始標。"; }
  else if(!ONLINE){ b.style.display="block"; b.textContent="⚠ 未連後端：標註只存這台瀏覽器，記得用「匯出 CSV」回傳。"; }
  else { b.style.display="none"; }
}
// 標前一定要有代號（沒填就選 → 答案會存進 anon、換代號時被洗掉 = 你遇到的「沒存到」）
function requireWho(){
  if(who()){ $("#who").style.outline=""; updateBanner(); return true; }
  $("#who").focus(); $("#who").style.outline="2px solid var(--warn)"; updateBanner();
  return false;
}
// 每次標註 = 一筆完整事件（含字幕＋片段 metadata），入佇列上傳；append-only
function submit(){
  if(!who()) return;
  const it=cur(), r=rec();
  if(!r.emotion) return;
  r.annotation_id=who()+"|"+it.id; r.ts=new Date().toISOString();   // 穩定 id：同一句同一人=同一列（後端 upsert）
  persist();
  enqueue({
    annotation_id:r.annotation_id, timestamp:r.ts, annotator:who(),
    utt_id:it.id, video_id:it.meta.video_id, start:it.meta.start, end:it.meta.end,
    wav_path:it.meta.wav_path, subtitle_text:it.meta.subtitle_text,
    sensevoice_ser:it.meta.sensevoice_ser, llm_emotion:it.meta.llm_emotion,
    human_emotion:r.emotion, confidence:r.conf||"", context_needed:r.ctx_needed?1:0,
  });
}

document.addEventListener("click", ev=>{
  const L=ev.target.closest(".cbtn"); if(L&&L.dataset.a){ play(+L.dataset.a,+L.dataset.b); return; }
  const e=ev.target.closest(".emo"); if(e){ if(!requireWho())return; rec().emotion=e.dataset.e; submit(); render(); return; }
  const c=ev.target.closest("#conf button"); if(c){ if(!requireWho())return; rec().conf=+c.dataset.c; submit(); render(); return; }
});
$("#playOne").onclick=()=>{ const it=cur(); play(it.t0,it.t1); };
$("#playCtx").onclick=()=>{ const it=cur(); play(it.c0,it.c1); };
$("#ckctx").addEventListener("change",e=>{ if(!requireWho()){ e.target.checked=false; return; } rec().ctx_needed=e.target.checked; if(rec().emotion) submit(); render(); });
$("#prev").onclick=()=>go(-1); $("#next").onclick=()=>go(1);
$("#who").addEventListener("change",()=>{ load(); render(); });
$("#who").addEventListener("input",updateBanner);
document.addEventListener("keydown",ev=>{
  if(ev.target.tagName==="INPUT") return;
  if(ev.key>="1"&&ev.key<="7"){ if(!requireWho())return; rec().emotion=EMOS[+ev.key-1][0]; submit(); render(); }
  else if(ev.key==="ArrowLeft"){ go(-1); } else if(ev.key==="ArrowRight"){ go(1); }
  else if(ev.key==="q"||ev.key==="Q"){ const it=cur(); play(it.t0,it.t1); }
  else if(ev.key==="w"||ev.key==="W"){ const it=cur(); play(it.c0,it.c1); }
});
$("#export").onclick=()=>{
  const w=who()||"anon";
  const head=["annotation_id","annotator","utt_id","video_id","start","end","wav_path","subtitle_text","sensevoice_ser","llm_emotion","human_emotion","confidence","context_needed","timestamp"];
  const rows=[head];
  ITEMS.forEach(it=>{ const r=store[it.id]; if(r&&r.emotion) rows.push([
    r.annotation_id||"",w,it.id,it.meta.video_id,it.meta.start,it.meta.end,it.meta.wav_path,it.meta.subtitle_text,
    it.meta.sensevoice_ser,it.meta.llm_emotion,r.emotion,r.conf||"",r.ctx_needed?1:0,r.ts||""]); });
  const csv=rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(",")).join("\n");
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob(["﻿"+csv],{type:"text/csv"}));
  a.download="taigi_annot_"+w+".csv"; a.click();
};

load(); render(); flush(); updateBanner();

</script></body></html>
